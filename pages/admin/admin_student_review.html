<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Student Review</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=DM+Sans:wght@400;500;600&display=swap"
        rel="stylesheet" />

    <style>
        body {
            margin: 0;
            font-family: "DM Sans", sans-serif;
            background: #f5f7fb;
        }

        /* HEADER */
        .review-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 28px;
            background: white;
            border-bottom: 1px solid #e6e9ef;
        }

        .review-header h2 {
            font-family: "Sora", sans-serif;
            font-size: 18px;
            margin: 0;
        }

        .review-header button {
            padding: 8px 14px;
            border: none;
            border-radius: 8px;
            background: #eef2f7;
            cursor: pointer;
        }

        /* LAYOUT */
        .review-page {
            max-width: 1100px;
            margin: auto;
            padding: 20px;
        }

        /* CARD */
        .review-container {
            display: grid;
            gap: 16px;
        }

        /* TOP CARD */
        .review-title {
            background: white;
            padding: 18px;
            border-radius: 14px;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.05);
        }

        .review-title h2 {
            margin: 0;
            font-family: "Sora", sans-serif;
        }

        .review-title p {
            margin: 4px 0 0;
            color: #666;
        }

        /* GRID */
        .review-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 16px;
        }

        /* CARDS */
        .review-card {
            background: white;
            padding: 16px;
            border-radius: 14px;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.05);
        }

        .review-card h3 {
            margin: 0 0 10px;
            font-size: 14px;
            color: #1f2d3d;
        }

        .review-card p {
            margin: 6px 0;
            font-size: 13px;
            color: #444;
        }

        /* ACTION BAR */
        .review-actions {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            padding: 14px;
            display: flex;
            justify-content: center;
            gap: 12px;
            border-top: 1px solid #e6e9ef;
        }

        .btn-primary {
            background: #1a7f72;
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 10px;
            cursor: pointer;
        }

        .btn-danger {
            background: #d64545;
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 10px;
            cursor: pointer;
        }

        .review-card.full {
            grid-column: 1 / -1;
        }

        .doc-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
            margin-top: 10px;
        }

        .doc-box {
            background: #f9fafc;
            border: 1px solid #e6e9ef;
            border-radius: 12px;
            padding: 12px;
            font-size: 13px;
            color: #333;
        }

        .doc-box.missing {
            background: #fff5f5;
            border-color: #f5c2c2;
            color: #c0392b;
        }

        .doc-name {
            margin-top: 6px;
            font-size: 12px;
            color: #666;
            word-break: break-word;
        }

        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #1a7f72;
            color: white;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
            opacity: 0;
            transform: translateY(-10px);
            pointer-events: none;
            transition: all 0.25s ease;
            z-index: 9999;
        }

        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: transparent;
            /* no dark dim */
            opacity: 0;
            pointer-events: none;
            transition: 0.25s ease;
            z-index: 999;
            backdrop-filter: none;
            /* remove blur */
        }

        .modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.95);
            background: #ffffff;
            padding: 22px;
            border-radius: 16px;
            width: 340px;
            max-width: 90vw;
            /* ✅ prevent overflow on small screens */
            box-sizing: border-box;
            /* ✅ important fix */
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
            opacity: 0;
            pointer-events: none;
            transition: 0.25s ease;
            z-index: 1000;
        }

        .modal.show,
        .modal-overlay.show {
            opacity: 1;
            pointer-events: auto;
            transform: translate(-50%, -50%) scale(1);
        }

        .modal h3 {
            margin: 0 0 14px;
            font-family: "Sora", sans-serif;
            font-size: 16px;
            color: #1f2d3d;
        }

        .modal input[type="date"] {
            width: 100%;
            max-width: 100%;
            box-sizing: border-box;
            /* prevents overflow */
            padding: 10px 12px;
            border-radius: 10px;
            border: 1px solid #ddd;
            font-family: inherit;
            outline: none;
        }

        .modal input:focus {
            border-color: #1a7f72;
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 14px;
        }

        .modal-actions button {
            padding: 8px 14px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-weight: 600;
        }

        #cancelModal {
            background: #eee;
        }

        #confirmModal {
            background: #1a7f72;
            color: white;
        }
    </style>
</head>

<body>

    <div class="review-header">
        <h2>Student Application Review</h2>
        <button onclick="goBack()">← Back</button>
    </div>

    <main class="review-page">

        <div id="reviewBody" class="review-container">
            Loading student data...
        </div>

    </main>

    <div class="review-actions">
        <button id="forSubmissionBtn"
            style="background:#c8902a;color:white;border:none;padding:10px 18px;border-radius:10px;cursor:pointer;display:none;">For
            Submission</button>
        <button class="btn-primary" id="approveBtn">Approve</button>
        <button class="btn-danger" id="rejectBtn">Reject</button>
    </div>
    <div id="toast" class="toast"></div>
    <div id="modalOverlay" class="modal-overlay"></div>

    <div id="submissionModal" class="modal">
        <h3>Set Submission Deadline</h3>

        <input type="date" id="submissionDate" />

        <div class="modal-actions">
            <button id="cancelModal">Cancel</button>
            <button id="confirmModal">Save</button>
        </div>
    </div>

    <div id="confirmModal2" class="modal">
        <h3 id="confirmModalTitle">Are you sure?</h3>
        <p id="confirmModalMsg" style="margin:0 0 14px;font-size:14px;color:#666;"></p>
        <div class="modal-actions">
            <button id="cancelConfirm">Cancel</button>
            <button id="okConfirm" style="background:#1a7f72;color:white;">Confirm</button>
        </div>
    </div>>

    <script type="module" src="/js/admin_student_review.js"></script>
    <script type="module" src="/js/admin_profile.js"></script>
</body>

</html>
