<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BFP OJT Portal | Calendar</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:wght@400;500;600&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="/css/calendar.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
</head>

<body>

    <aside class="sidebar">
        <div class="sidebar-logo">
            <div class="logo-badge">
                <img src="/assets/images/BFP.jpg" alt="BFP Logo">
            </div>
            <span>OJT Portal</span>
        </div>
        <nav class="sidebar-nav">
            <a class="nav-item" href="/pages/student/dashboard.html">Dashboard</a>
            <a class="nav-item" href="/pages/student/announcement.html">Announcements</a>
            <a class="nav-item active" href="/pages/student/calender.html">Calendar &amp; Time</a>
            <a class="nav-item" href="recommendations.html">My Office</a>
        </nav>
        <div class="sidebar-footer">
            <button class="logout-btn" id="logoutBtn">← Log out</button>

           
        </div>
    </aside>
    </aside>

    <div id="logoutModal"
        style="position:fixed;inset:0;display:none;align-items:center;justify-content:center;z-index:9999;">
        <div
            style="background:white;padding:24px;border-radius:16px;width:320px;box-shadow:0 20px 60px rgba(0,0,0,0.2);">
            <h3 style="margin:0 0 8px;font-family:'Sora',sans-serif;font-size:16px;color:#1f2d3d;">Log out</h3>
            <p style="margin:0 0 20px;font-size:14px;color:#666;">Are you sure you want to log out?</p>
            <div style="display:flex;justify-content:flex-end;gap:10px;">
                <button id="cancelLogout"
                    style="padding:8px 14px;border-radius:10px;border:none;background:#eee;cursor:pointer;font-weight:600;">Cancel</button>
                <button id="confirmLogout"
                    style="padding:8px 14px;border-radius:10px;border:none;background:#1a7f72;color:white;cursor:pointer;font-weight:600;">Log
                    out</button>
            </div>
        </div>
    </div>
    <!-- MAIN -->
    <main class="main">

        <!-- Header -->
        <div class="top-header">
            <div>
                <p class="page-label">Schedule Center</p>
                <h1 class="page-title">Calendar &amp; Time</h1>
            </div>
            <div class="datetime-box">
                <div class="datetime-date" id="dateDisplay"></div>
                <div class="datetime-time" id="timeDisplay"></div>
            </div>
        </div>

        <div class="content-grid">

            <!-- CALENDAR PANEL -->
            <div class="panel cal-panel">

                <div class="cal-header">
                    <button class="cal-nav" id="prevMonth" aria-label="Previous month">
                        <svg viewBox="0 0 20 20" fill="none" width="16" height="16">
                            <path d="M13 15l-5-5 5-5" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round" />
                        </svg>
                    </button>
                    <div class="cal-header-center">
                        <span class="cal-month" id="monthLabel"></span>
                        <span class="cal-label">BFP Internship Calendar</span>
                    </div>
                    <button class="cal-nav" id="nextMonth" aria-label="Next month">
                        <svg viewBox="0 0 20 20" fill="none" width="16" height="16">
                            <path d="M7 5l5 5-5 5" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round" />
                        </svg>
                    </button>
                </div>

                <div class="cal-grid" id="calGrid"></div>

                <!-- Day detail strip -->
                <div class="day-detail" id="dayDetail" style="display:none;">
                    <div class="day-detail-date" id="dayDetailDate"></div>
                    <div class="day-detail-events" id="dayDetailEvents"></div>
                </div>

            </div>

            <!-- RIGHT COLUMN -->
            <div class="right-col">

                <!-- Upcoming Events -->
                <div class="panel">
                    <div class="events-panel-header">
                        <span class="panel-title">Upcoming Events</span>
                        <span class="panel-sub">From Admin Announcements</span>
                    </div>
                    <div class="event-list" id="eventList">
                        <div class="event-empty" id="eventEmpty">No upcoming events.</div>
                    </div>
                </div>

                <!-- Legend -->
                <div class="panel legend-card">
                    <div class="legend-title">Schedule Legend</div>
                    <div class="legend-items">
                        <div class="legend-item">
                            <span class="legend-color today"></span>
                            <span>Today</span>
                        </div>
                        <div class="legend-item">
                            <span class="legend-color event"></span>
                            <span>Announcement Deadline</span>
                        </div>
                        <div class="legend-item">
                            <span class="legend-color selected"></span>
                            <span>Selected Day</span>
                        </div>
                        <div class="legend-item">
                            <span class="legend-color normal"></span>
                            <span>Regular Day</span>
                        </div>
                    </div>
                </div>

            </div>

        </div>
    </main>

    <script type="module" src="/js/calendar.js"></script>



</body>

</html>
